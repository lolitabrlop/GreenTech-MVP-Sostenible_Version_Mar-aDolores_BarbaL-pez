<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GreenTech - Sostenibilidad Real</title>
  <meta name="description" content="MVP optimizado de GreenTech con baja huella de carbono.">
  
  <style>
    :root {
      primary: #28a745;
      dark: #212529;
      text-light: #f4fdf4;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(text-light);
      margin: 0;
      color: var(dark);
    }

    .hero {
      position: relative;
      height: 100vh;
      display: grid;
      place-content: center;
      text-align: center;
      color: white;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                  url('https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&q=60&w=1200') no-repeat center/cover;
    }

    h1 { 
      font-size: clamp(2.5rem, 8vw, 5rem); 
      margin: 0; font-weight: 900; 
    }
    p { 
      font-size: 1.5rem; 
      margin: 1rem 0; 
      opacity: 0.9; 
    }

    .btn-eco {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background-color: var(primary);
      color: white;
      padding: 12px 35px;
      font-size: 1.25rem;
      border-radius: 50px;
      text-decoration: none;
      transition: transform 0.2s ease;
      border: none;
      cursor: pointer;
    }

    .btn-eco:hover { 
      transform: scale(1.05); 
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      background: var(dark);
      color: white;
    }
  </style>
</head>
<body>

  <main class="hero">
    <h1>Salvemos el Planeta</h1>
    <p>Únete a la revolución verde de GreenTech.</p>

    <button class="btn-eco">
      <svg width="20" height="20" fill="currentColor">
        <rect width="20" height="20" rx="4" />
      </svg>
      Quiero ayudar
    </button>
  </main>

  <footer id="footer">
    GreenTech Solutions &copy; <span id="year"></span> - Infraestructura de baja huella.
  </footer>
</body>
</html>
